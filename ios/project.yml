name: JejuFolklore
options:
  bundleIdPrefix: com.keepdev
  deploymentTarget:
    iOS: "17.0"
  defaultConfig: Debug
  xcodeVersion: "16.0"

settings:
  base:
    SWIFT_VERSION: "5.10"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"

schemes:
  JejuFolklore:
    build:
      targets:
        JejuFolklore: all
    run:
      config: Debug
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release

targets:
  JejuFolklore:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: JejuFolklore/Sources
      - path: JejuFolklore/Resources/Assets.xcassets
      - path: JejuFolklore/debug-route.gpx
        optional: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.keepdev.jejufolklore
        INFOPLIST_FILE: JejuFolklore/Resources/Info.plist
        DEVELOPMENT_TEAM: ""
    entitlements:
      path: JejuFolklore/Resources/JejuFolklore.entitlements
    info:
      path: JejuFolklore/Resources/Info.plist
      properties:
        UILaunchScreen:
          UIColorName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSLocationWhenInUseUsageDescription: "여행 중 근처 설화를 찾고 장소 도착을 감지하기 위해 위치를 사용합니다."
        NSLocationAlwaysAndWhenInUseUsageDescription: "탐험 모드에서 백그라운드 GPS 추적 및 장소 도착 알림을 위해 항상 위치 접근이 필요합니다."
        UIBackgroundModes:
          - location
          - audio
        NSMicrophoneUsageDescription: "오디오 가이드 재생을 위해 필요합니다."
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
        LSApplicationQueriesSchemes:
          - comgooglemaps
