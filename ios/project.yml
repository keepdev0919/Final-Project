name: JejuFolklore
options:
  bundleIdPrefix: com.keepdev
  deploymentTarget:
    iOS: "17.0"
  defaultConfig: Debug
  xcodeVersion: "16.0"

settings:
  base:
    SWIFT_VERSION: "5.10"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"

schemes:
  JejuFolklore:
    build:
      targets:
        JejuFolklore: all
    run:
      config: Debug
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release

packages:
  GoogleMaps:
    url: https://github.com/googlemaps/ios-maps-sdk
    from: 9.0.0

targets:
  JejuFolklore:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: JejuFolklore/Sources
      - path: JejuFolklore/Resources/Assets.xcassets
      - path: JejuFolklore/debug-route.gpx
        optional: true
    configFiles:
      Debug: JejuFolklore/Resources/Secrets.xcconfig
      Release: JejuFolklore/Resources/Secrets.xcconfig
    dependencies:
      - package: GoogleMaps
        product: GoogleMaps
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.keepdev.jejufolklore
        INFOPLIST_FILE: JejuFolklore/Resources/Info.plist
        DEVELOPMENT_TEAM: ""
    entitlements:
      path: JejuFolklore/Resources/JejuFolklore.entitlements
    info:
      path: JejuFolklore/Resources/Info.plist
      properties:
        UILaunchScreen:
          UIColorName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSLocationWhenInUseUsageDescription: "여행 중 근처 설화를 찾고 장소 도착을 감지하기 위해 위치를 사용합니다."
        NSLocationAlwaysAndWhenInUseUsageDescription: "탐험 모드에서 백그라운드 GPS 추적 및 장소 도착 알림을 위해 항상 위치 접근이 필요합니다."
        UIBackgroundModes:
          - location
          - audio
        NSMicrophoneUsageDescription: "리뷰 입력 시 음성 받아쓰기를 위해 마이크를 사용합니다."
        NSSpeechRecognitionUsageDescription: "음성을 텍스트로 변환하기 위해 음성 인식을 사용합니다."
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
        LSApplicationQueriesSchemes:
          - comgooglemaps
        GOOGLE_MAPS_API_KEY: $(GOOGLE_MAPS_API_KEY)
